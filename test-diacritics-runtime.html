<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Diacritics Test</title>
</head>
<body>
    <h1>Arabic Diacritics Test</h1>
    <div id="output"></div>
    
    <script type="module">
        // Test if diacritics survive in JavaScript
        const testWord = 'مَسْجِدٌ';
        const output = document.getElementById('output');
        
        output.innerHTML = `
            <p><strong>Test Word:</strong> ${testWord}</p>
            <p><strong>Length:</strong> ${testWord.length} characters</p>
            <p><strong>Char codes:</strong> ${Array.from(testWord).map(c => c.charCodeAt(0).toString(16)).join(', ')}</p>
            <p><strong>Has diacritics:</strong> ${/[\u064B-\u0652]/.test(testWord) ? 'YES' : 'NO'}</p>
        `;
        
        console.log('Test word:', testWord);
        console.log('Char codes:', Array.from(testWord).map(c => '0x' + c.charCodeAt(0).toString(16)));
    </script>
</body>
</html>
